---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.rbacgraph.in-cloud.io
  {{- if eq .Values.internalTLS.certSource "certmanager" }}
  annotations:
    cert-manager.io/inject-ca-from: "{{ .Release.Namespace }}/{{ include "k8s-rbac-engine-chart.fullname" . }}"
  {{- end }}
  labels:
    {{- include "k8s-rbac-engine-chart.labels" . | nindent 4 }}
spec:
  group: rbacgraph.in-cloud.io
  version: v1alpha1
  groupPriorityMinimum: 100
  versionPriority: 100
  service:
    name: {{ include "k8s-rbac-engine-chart.fullname" . }}
    namespace: {{ .Release.Namespace }}
    port: {{ .Values.service.port }}
  {{- if ne .Values.internalTLS.certSource "certmanager" }}
  insecureSkipTLSVerify: true
  {{- end }}
