{{- if .Values.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-rbac-engine-chart.fullname" . }}-rbac-reader
  labels:
    {{- include "k8s-rbac-engine-chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-rbac-engine-chart.fullname" . }}-rbac-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-rbac-engine-chart.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
